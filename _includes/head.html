<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
  <meta name="generator" content="Jekyll">

  <title>{%if page.title %}{{ page.title }} -- d4rpell{% else %}{{ site.title }}{% endif %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl | replace: '//', '/' }}">

  <link href="/atom.xml" type="application/atom+xml" rel="alternate" title="ATOM Feed">

  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var prefer = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', saved || prefer);
    })();
  </script>

  {% seo %}
</head>
